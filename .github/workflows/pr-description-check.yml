name: PR Description Check

# Fires every time a PR is opened, reopened, or edited — by a human OR an agent.
# Verifies the description is actually filled out (all required sections present
# and non-empty). If not, it posts/updates a single sticky comment prompting the
# author to complete it. It never blocks merge on its own; make the check
# "Required" in branch protection if you want it to gate.

on:
  pull_request_target:
    types: [opened, reopened, edited, synchronize]

permissions:
  pull-requests: write

concurrency:
  group: pr-desc-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR description is filled out
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';

            // Required section headings (must match the PR template).
            const required = [
              'Summary',
              'Changes',
              'Test plan',
              'Risks / rollback',
            ];

            // Strip HTML comments (template placeholders) before checking content.
            const stripped = body.replace(/<!--[\s\S]*?-->/g, '');

            // Split the body into "## Heading" -> section-text so each section's
            // content is bounded by the NEXT heading (any level 2 heading, required
            // or not). Avoids one section's regex swallowing the following one.
            const headingRe = /^#{2,}\s+(.+?)\s*$/gm;
            const found = [];
            let m;
            while ((m = headingRe.exec(stripped)) !== null) {
              found.push({
                name: m[1].trim().toLowerCase(),
                start: m.index,                 // where this heading line begins
                contentStart: headingRe.lastIndex, // where this section's body begins
              });
            }
            const sections = {};
            for (let i = 0; i < found.length; i++) {
              const end = i + 1 < found.length ? found[i + 1].start : stripped.length;
              sections[found[i].name] = stripped.slice(found[i].contentStart, end);
            }

            // A section is "filled" if, after removing bullets/whitespace, anything remains.
            const missing = [];
            for (const heading of required) {
              const content = (sections[heading.toLowerCase()] || '').replace(/[-*\s]/g, '');
              if (!content) missing.push(heading);
            }

            const marker = '<!-- pr-description-check -->';
            const { owner, repo } = context.repo;
            const issue_number = pr.number;

            // Find an existing sticky comment from this workflow.
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (missing.length === 0) {
              // Description is complete — clear any prior nudge.
              if (existing) {
                await github.rest.issues.updateComment({
                  owner, repo, comment_id: existing.id,
                  body: `${marker}\n✅ PR description looks complete — thanks!`,
                });
              }
              return;
            }

            const list = missing.map(s => `- \`## ${s}\``).join('\n');
            const nudge = [
              marker,
              '### 📝 Please fill out the PR description',
              '',
              'This PR is missing or has empty required sections:',
              '',
              list,
              '',
              'Complete them so reviewers have context. Using Claude Code? Just run ' +
              '`/pr-describe` to generate the whole description from the branch diff.',
              '',
              '<sub>This check runs automatically on every PR. It re-checks when you edit the description.</sub>',
            ].join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body: nudge,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body: nudge,
              });
            }
